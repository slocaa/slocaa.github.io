<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>∞ Mirror Room</title>
  <style>
    *{margin:0;padding:0}
    body{background:#000;overflow:hidden;font-family:system-ui,sans-serif}
    canvas{display:block}
    #hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:14px 20px;pointer-events:none;z-index:10}
    .hb{background:rgba(0,0,0,.55);backdrop-filter:blur(10px);padding:7px 14px;border-radius:10px;font-size:13px;color:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.06)}
    #cross{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:11;pointer-events:none;width:22px;height:22px}
    #cross::before,#cross::after{content:'';position:absolute;background:rgba(255,255,255,.45);border-radius:1px}
    #cross::before{width:1.5px;height:100%;left:50%;transform:translateX(-50%)}
    #cross::after{height:1.5px;width:100%;top:50%;transform:translateY(-50%)}
    #msg{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.25);pointer-events:none;z-index:10;background:rgba(0,0,0,.4);padding:5px 14px;border-radius:16px}
    #hint{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:12;pointer-events:none;font-size:20px;opacity:0;transition:opacity .3s;text-shadow:0 0 30px currentColor}
    #flash{position:fixed;inset:0;z-index:9;pointer-events:none;background:radial-gradient(circle,rgba(255,215,0,.25),transparent 70%);opacity:0;transition:opacity .15s}
    #flash.on{opacity:1}
    #S{position:fixed;inset:0;z-index:20;background:rgba(0,0,0,.93);backdrop-filter:blur(24px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .6s}
    #S.gone{opacity:0;pointer-events:none}
    #S h1{font-size:48px;font-weight:100;color:#fff;letter-spacing:12px;text-transform:uppercase}
    #S p{font-size:13px;color:rgba(255,255,255,.35);text-align:center;line-height:2}
    .k{display:inline-block;padding:2px 8px;border:1px solid rgba(255,255,255,.15);border-radius:4px;font-size:11px;color:rgba(255,255,255,.45);margin:0 2px}
    #go{margin-top:14px;padding:14px 56px;font-size:15px;letter-spacing:4px;background:rgba(255,255,255,.06);color:#fff;border:1px solid rgba(255,255,255,.12);border-radius:14px;cursor:pointer;transition:all .2s;text-transform:uppercase}
    #go:hover{background:rgba(255,255,255,.12);transform:scale(1.04)}
  </style>
</head>
<body>
  <div id="cross"></div>
  <div id="hint"></div>
  <div id="flash"></div>
  <div id="hud">
    <div class="hb" id="sbox">Find the GOLD orb</div>
    <div class="hb" id="tbox">0:00</div>
  </div>
  <div id="msg">WASD move · Mouse look · Click orb to collect</div>
  <div id="S">
    <h1>Mirror Room</h1>
    <p>An infinite mirrored hall stretches forever in every direction.<br>
    Glowing orbs hover in a grid — but only the <span style="color:#ffd700">GOLD</span> one is real.<br>
    Find it. Click it. Escape.</p>
    <p><span class="k">W</span><span class="k">A</span><span class="k">S</span><span class="k">D</span> move · <span class="k">Mouse</span> look · <span class="k">Click</span> collect</p>
    <button id="go">Enter</button>
  </div>
  <script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"}}</script>
  <script type="module" src="game.js"></script>
</body>
</html>
