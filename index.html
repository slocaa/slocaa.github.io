<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tower Defense</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden}
    canvas{border-radius:8px;box-shadow:0 0 40px rgba(0,0,0,.5);cursor:crosshair}
    #ui{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:10}
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="ui"></div>
  <script type="module" src="game.js"></script>
</body>
</html>
