<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirror Room</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#000;overflow:hidden;font-family:system-ui,sans-serif}
    canvas{display:block}
    #hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:16px 24px;pointer-events:none;z-index:10}
    .hud-box{background:rgba(0,0,0,.6);backdrop-filter:blur(8px);padding:8px 16px;border-radius:10px;font-size:14px;color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.08)}
    #crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:11;pointer-events:none}
    #crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.6);border-radius:1px}
    #crosshair::before{width:2px;height:24px;left:50%;transform:translateX(-50%)}
    #crosshair::after{height:2px;width:24px;top:50%;transform:translateY(-50%)}
    #msg{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);font-size:13px;color:rgba(255,255,255,.35);pointer-events:none;z-index:10;background:rgba(0,0,0,.5);padding:6px 16px;border-radius:20px;backdrop-filter:blur(8px)}
    #start{position:fixed;inset:0;z-index:20;background:rgba(0,0,0,.92);backdrop-filter:blur(20px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .5s}
    #start.gone{opacity:0;pointer-events:none}
    #start h1{font-size:48px;font-weight:200;color:#fff;letter-spacing:10px}
    #start p{font-size:14px;color:rgba(255,255,255,.4);text-align:center;line-height:1.8}
    .key{display:inline-block;padding:2px 8px;border:1px solid rgba(255,255,255,.2);border-radius:4px;font-size:12px;color:rgba(255,255,255,.5);margin:0 2px}
    #go{margin-top:12px;padding:14px 52px;font-size:16px;letter-spacing:3px;background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.15);border-radius:12px;cursor:pointer;transition:all .2s}
    #go:hover{background:rgba(255,255,255,.15);transform:scale(1.05)}
    #hint{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:12;pointer-events:none;font-size:16px;color:rgba(100,200,255,.8);opacity:0;transition:opacity .3s;text-shadow:0 0 20px rgba(100,200,255,.5)}
    #flash{position:fixed;inset:0;z-index:9;pointer-events:none;background:radial-gradient(circle,rgba(100,200,255,.2),transparent 70%);opacity:0;transition:opacity .15s}
    #flash.on{opacity:1}
  </style>
</head>
<body>
  <div id="crosshair"></div>
  <div id="hint"></div>
  <div id="flash"></div>
  <div id="hud">
    <div class="hud-box" id="scorebox">Find the GOLD orb</div>
    <div class="hud-box" id="timerbox">0:00</div>
  </div>
  <div id="msg">WASD move · Mouse look · Click orb to collect</div>
  <div id="start">
    <h1>MIRROR ROOM</h1>
    <p>You're trapped in an infinite mirror room.<br>
    Orbs float everywhere — but only ONE is real.<br>
    Find and click the <span style="color:#ffd700">GOLD</span> orb to escape.</p>
    <p>
      <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> move ·
      <span class="key">Mouse</span> look ·
      <span class="key">Click</span> collect
    </p>
    <button id="go">▶ ENTER</button>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
